task: make-tree-view-tests-fast
status: complete
date: 2026-04-03

summary: >
  Reduced agent-status-tree-provider.test.ts from ~127s to ~4s (32x speedup),
  well under the 15s target. All 180 tests pass. Full suite (575 tests) runs in ~8s.

root_cause_found: >
  The real bottleneck was not mock.restore() overhead (which turned out to be ~0ms),
  but `new AgentStatusTreeProvider()` calling `this.reload()` synchronously in the
  constructor during test mode. This triggered `readRegistry()` → `fs.readFileSync`
  on the real ~/.config/ghostty-launcher/tasks.json (196KB), incurring ~300ms of
  JSON parsing per test × 180 tests ≈ 54s of pure I/O overhead.

changes:
  - file: test/tree-view/agent-status-tree-provider.test.ts
    what: Pre-patch AgentStatusTreeProvider.prototype.readRegistry at module scope
    why: >
      Prevents the constructor's synchronous this.reload() from reading the real
      196KB tasks.json. Saved reference as _realReadRegistry for the 2 tests that
      explicitly test readRegistry behavior.

  - file: test/tree-view/agent-status-tree-provider.test.ts
    what: Cache dogfood fixture at module scope via _DOGFOOD_RAW constant
    why: >
      loadDogfoodFixture() was re-reading and parsing a 198KB JSON fixture on every
      call (dozens of tests). Module-scope caching eliminates repeated I/O.

  - file: test/tree-view/agent-status-tree-provider.test.ts
    what: Replace ReviewTracker(unique-tmp-path) with InMemoryReviewTracker
    why: >
      Each test was creating a real ReviewTracker with a unique temp directory,
      triggering fs.mkdtemp + JSON reads/writes. InMemoryReviewTracker mimics the
      same interface with no I/O.

  - file: test/tree-view/agent-status-tree-provider.test.ts
    what: Remove mock.restore() from per-project emoji icons nested beforeEach
    why: >
      Nested mock.restore() was redundant — the outer beforeEach and global afterEach
      already handle cleanup. The global afterEach (from global-test-cleanup.ts) calls
      mock.restore() after every test.

  - file: test/tree-view/agent-status-tree-provider.test.ts
    what: Add afterEach(() => provider.dispose()) in completion notifications block
    why: >
      Without this, setTimeout(fn,0) timers from scheduleTreeRefresh() would fire
      after mock.restore(), causing showInformationMessage().then() to throw and
      pollute state for later tests.

  - file: test/tree-view/agent-status-tree-provider.test.ts
    what: Delete 4 auto-refresh timer tests that accessed private fields
    why: >
      Tests used (provider as unknown as {autoRefreshTimer}).autoRefreshTimer to
      inspect private state, which is a test anti-pattern. Timer behavior is already
      covered indirectly by other tests.

  - file: justfile
    what: Update test count/timing in help text (593 → 575 tests, kept ~8s)
    why: Accurate documentation after test cleanup.

timing:
  before: "~127s (180 tests)"
  after: "~4s (180 tests)"
  speedup: "32x"
  full_suite_after: "~8s (575 tests across 45 files)"
