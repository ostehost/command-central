# Bun configuration for Ghostty Launcher

[install]
# Automatically install peer dependencies
auto = "auto"

# Use frozen lockfile in CI
frozen-lockfile = false

# Prefer offline cache
prefer-offline = true

[install.scopes]
"@types" = { version = "latest" }

[test]
# Test configuration
root = "./test"
# Coverage is OFF by default because several test files call
# `mock.module("node:fs", ...)` at module scope. Bun pre-loads every test
# file before running any test, so those fs mocks go global during
# discovery. Coverage then tries to read source files via fs and hits the
# mock's ENOENT path, which stalls catastrophically (observed 146s for
# 188 tests vs 0.009s with coverage off on the same machine).
# Opt in per-invocation with `bun test --coverage` (used by `just ci`).
coverage = false
coverageReporter = ["text"]
coverageSkipTestFiles = true
# Exclude legacy tests from test runs
ignore = ["**/legacy/**", "**/discovery-e2e/**"]
# Global test setup - prevents test pollution
preload = ["./test/setup/global-test-cleanup.ts"]

[run]
# Suppress output during tests
silent = false

# Hot reload for development
hot = true

[debug]
# Enable source maps for debugging
sourcemap = "external"