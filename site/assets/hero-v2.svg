<svg viewBox="0 0 480 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-bright { fill: #e6edf3; font-family: system-ui, -apple-system, sans-serif; }
      .text-muted { fill: #8b949e; font-family: system-ui, -apple-system, sans-serif; }
      .text-accent { fill: #58a6ff; font-family: system-ui, -apple-system, sans-serif; }
      .bg-primary { fill: #161b22; }
      .bg-card { fill: #21262d; }
      .border-card { stroke: #30363d; stroke-width: 1; fill: none; }
      .text-green { fill: #3fb950; }
      .text-orange { fill: #f0883e; }
      .text-red { fill: #da3633; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="720" class="bg-primary"/>

  <!-- Cmd+Tab Interface Section -->
  <g id="cmdtab-section">
    <!-- Cmd+Tab background -->
    <rect x="60" y="40" width="360" height="140" rx="12" fill="#1c1c1e" stroke="#3a3a3c" stroke-width="1"/>
    
    <!-- Header -->
    <text x="240" y="70" class="text-bright" text-anchor="middle" font-size="14" font-weight="500">⌘ Command Central Projects</text>
    
    <!-- App Icons Row -->
    <g id="app-icons">
      <!-- 🚀 (running - green border) -->
      <g id="rocket-app">
        <rect x="85" y="90" width="40" height="40" rx="8" fill="#2a2a2e" stroke="#3fb950" stroke-width="2"/>
        <text x="105" y="115" class="text-bright" text-anchor="middle" font-size="20">🚀</text>
        <text x="105" y="155" class="text-muted" text-anchor="middle" font-size="10">my-app</text>
      </g>
      
      <!-- ⚡ (completed - checkmark) -->
      <g id="bolt-app">
        <rect x="145" y="90" width="40" height="40" rx="8" fill="#2a2a2e" stroke="#3a3a3c" stroke-width="1"/>
        <text x="165" y="115" class="text-bright" text-anchor="middle" font-size="20">⚡</text>
        <circle cx="175" cy="95" r="6" fill="#3fb950"/>
        <path d="M172 95 L174 97 L178 93" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <text x="165" y="155" class="text-muted" text-anchor="middle" font-size="10">api-server</text>
      </g>
      
      <!-- 🧱 (idle) -->
      <g id="brick-app">
        <rect x="205" y="90" width="40" height="40" rx="8" fill="#2a2a2e" stroke="#3a3a3c" stroke-width="1"/>
        <text x="225" y="115" class="text-bright" text-anchor="middle" font-size="20">🧱</text>
        <text x="225" y="155" class="text-muted" text-anchor="middle" font-size="10">shared-lib</text>
      </g>
      
      <!-- Terminal/Ghostty Icon -->
      <g id="terminal-app">
        <rect x="265" y="90" width="40" height="40" rx="8" fill="#2a2a2e" stroke="#3a3a3c" stroke-width="1"/>
        <rect x="270" y="95" width="30" height="22" rx="2" fill="#1a1a1a"/>
        <text x="285" y="108" class="text-green" text-anchor="middle" font-size="8" font-family="monospace">$</text>
        <rect x="287" y="104" width="8" height="1" fill="#3fb950"/>
        <text x="285" y="155" class="text-muted" text-anchor="middle" font-size="10">terminal</text>
      </g>
    </g>
  </g>

  <!-- Connecting Lines -->
  <g id="connection-lines" stroke="#58a6ff" stroke-width="1" fill="none" stroke-dasharray="3,3" opacity="0.6">
    <!-- Rocket connection -->
    <path d="M105 180 Q105 220 85 250"/>
    <!-- Bolt connection -->
    <path d="M165 180 Q165 220 85 290"/>
    <!-- Brick connection -->
    <path d="M225 180 Q225 220 85 370"/>
  </g>

  <!-- VS Code Interface Section -->
  <g id="vscode-section">
    <!-- Activity Bar -->
    <rect x="20" y="240" width="48" height="450" fill="#2c2c2c"/>
    
    <!-- CC Icon in Activity Bar -->
    <rect x="30" y="650" width="28" height="28" rx="4" fill="#58a6ff"/>
    <text x="44" y="670" class="text-bright" text-anchor="middle" font-size="12" font-weight="bold">CC</text>
    
    <!-- Main Sidebar -->
    <rect x="68" y="240" width="380" height="450" class="bg-card" rx="0"/>
    <rect x="68" y="240" width="380" height="450" class="border-card" rx="0"/>
    
    <!-- Sidebar Header -->
    <g id="sidebar-header">
      <text x="88" y="270" class="text-bright" font-size="13" font-weight="600">COMMAND CENTRAL</text>
      <text x="418" y="270" class="text-muted" font-size="14">⋯</text>
    </g>
    
    <!-- Grouping Options -->
    <rect x="88" y="285" width="340" height="35" rx="4" fill="#1a1a1a" stroke="#3a3a3c" stroke-width="0.5"/>
    <text x="100" y="298" class="text-muted" font-size="10">GROUPING OPTIONS</text>
    <circle cx="105" cy="308" r="4" fill="#58a6ff"/>
    <text x="115" y="312" class="text-bright" font-size="11">No Grouping</text>
    <circle cx="225" cy="308" r="4" fill="none" stroke="#3a3a3c" stroke-width="1"/>
    <text x="235" y="312" class="text-muted" font-size="11">Git Status</text>
    
    <!-- Extension Filter -->
    <rect x="88" y="330" width="340" height="35" rx="4" fill="#1a1a1a" stroke="#3a3a3c" stroke-width="0.5"/>
    <text x="100" y="343" class="text-muted" font-size="10">EXTENSION FILTER</text>
    <rect x="105" y="350" width="12" height="8" rx="1" fill="#f0c674"/>
    <text x="120" y="357" class="text-bright" font-size="11">📄 .json (2)</text>
    <rect x="200" y="350" width="16" height="8" rx="1" fill="#3fb950"/>
    <text x="218" y="357" class="text-bright" font-size="9" fill="white">TS</text>
    <text x="240" y="357" class="text-bright" font-size="11">📄 .ts (10)</text>
    
    <!-- Project: 🚀 MY-APP -->
    <g id="project-rocket">
      <text x="88" y="395" class="text-bright" font-size="13">🚀 MY-APP</text>
      <text x="170" y="395" class="text-bright" font-size="13">▾</text>
      <text x="185" y="395" class="text-muted" font-size="11">(6)</text>
      
      <!-- Expandable section -->
      <text x="105" y="415" class="text-muted" font-size="11">▸ Today (3 files)</text>
      
      <!-- File entries -->
      <g id="rocket-files">
        <!-- App.ts -->
        <rect x="120" y="430" width="16" height="8" rx="1" fill="#3fb950"/>
        <text x="138" y="437" class="text-bright" font-size="8" fill="white">TS</text>
        <text x="155" y="437" class="text-bright" font-size="11">App.ts</text>
        <text x="320" y="437" class="text-muted" font-size="10">now</text>
        <rect x="370" y="432" width="12" height="8" rx="2" fill="#f0883e"/>
        <text x="376" y="438" fill="white" font-size="7">M</text>
        
        <!-- config.ts -->
        <rect x="120" y="450" width="16" height="8" rx="1" fill="#3fb950"/>
        <text x="138" y="457" class="text-bright" font-size="8" fill="white">TS</text>
        <text x="155" y="457" class="text-bright" font-size="11">config.ts</text>
        <text x="290" y="457" class="text-muted" font-size="10">2 hours ago</text>
        <rect x="370" y="452" width="12" height="8" rx="2" fill="#3fb950"/>
        <text x="376" y="458" fill="white" font-size="7">U</text>
        
        <!-- settings.json -->
        <rect x="120" y="470" width="16" height="8" rx="1" fill="#f0c674"/>
        <text x="138" y="477" class="text-bright" font-size="8" fill="#333">{}</text>
        <text x="155" y="477" class="text-bright" font-size="11">settings.json</text>
        <text x="290" y="477" class="text-muted" font-size="10">8 hours ago</text>
        <rect x="370" y="472" width="12" height="8" rx="2" fill="#3fb950"/>
        <text x="376" y="478" fill="white" font-size="7">U</text>
      </g>
    </g>
    
    <!-- Project: ⚡ API-SERVER -->
    <g id="project-bolt">
      <text x="88" y="515" class="text-bright" font-size="13">⚡ API-SERVER</text>
      <text x="200" y="515" class="text-bright" font-size="13">▾</text>
      <text x="215" y="515" class="text-muted" font-size="11">(5)</text>
      
      <!-- Expandable section -->
      <text x="105" y="535" class="text-muted" font-size="11">▸ Today (2 files)</text>
      
      <!-- File entries -->
      <g id="bolt-files">
        <!-- server.ts -->
        <rect x="120" y="550" width="16" height="8" rx="1" fill="#3fb950"/>
        <text x="138" y="557" class="text-bright" font-size="8" fill="white">TS</text>
        <text x="155" y="557" class="text-bright" font-size="11">server.ts</text>
        <text x="290" y="557" class="text-muted" font-size="10">8 hours ago</text>
        <rect x="370" y="552" width="12" height="8" rx="2" fill="#f0883e"/>
        <text x="376" y="558" fill="white" font-size="7">M</text>
        
        <!-- auth.ts -->
        <rect x="120" y="570" width="16" height="8" rx="1" fill="#3fb950"/>
        <text x="138" y="577" class="text-bright" font-size="8" fill="white">TS</text>
        <text x="155" y="577" class="text-bright" font-size="11">auth.ts</text>
        <text x="290" y="577" class="text-muted" font-size="10">8 hours ago</text>
        <rect x="370" y="572" width="12" height="8" rx="2" fill="#f0883e"/>
        <text x="376" y="578" fill="white" font-size="7">M</text>
      </g>
    </g>
    
    <!-- Project: 🧱 SHARED-LIB -->
    <g id="project-brick">
      <text x="88" y="615" class="text-bright" font-size="13">🧱 SHARED-LIB</text>
      <text x="200" y="615" class="text-bright" font-size="13">▾</text>
      <text x="215" y="615" class="text-muted" font-size="11">(1)</text>
      
      <!-- Expandable section -->
      <text x="105" y="635" class="text-muted" font-size="11">▸ Today (1 file)</text>
      
      <!-- File entries -->
      <g id="brick-files">
        <!-- utils.ts -->
        <rect x="120" y="650" width="16" height="8" rx="1" fill="#3fb950"/>
        <text x="138" y="657" class="text-bright" font-size="8" fill="white">TS</text>
        <text x="155" y="657" class="text-bright" font-size="11">utils.ts</text>
        <text x="290" y="657" class="text-muted" font-size="10">8 hours ago</text>
        <rect x="370" y="652" width="12" height="8" rx="2" fill="#f0883e"/>
        <text x="376" y="658" fill="white" font-size="7">M</text>
      </g>
    </g>
  </g>
</svg>