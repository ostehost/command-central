<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .sidebar-bg { fill: #1c2128; }
      .panel-bg { fill: #21262d; }
      .panel-header { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #e6edf3; text-transform: uppercase; letter-spacing: 0.5px; }
      .task-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #e6edf3; }
      .task-time { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #8b949e; }
      .status-completed { fill: #3fb950; }
      .status-running { fill: #58a6ff; }
      .spinner { fill: #58a6ff; transform-origin: center; animation: spin 1s linear infinite; }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="480" height="300" fill="#161b22"/>
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="280" height="300" class="sidebar-bg"/>
  
  <!-- Panel header -->
  <rect x="0" y="0" width="280" height="35" class="panel-bg"/>
  <text x="15" y="24" class="panel-header">Agent Status</text>
  
  <!-- Collapse/expand icon -->
  <path d="M250,15 L255,20 L250,25" stroke="#8b949e" stroke-width="1.5" fill="none"/>
  
  <!-- Task entries -->
  
  <!-- Task 1: fix-auth-bug (completed) -->
  <g class="task-entry">
    <rect x="0" y="35" width="280" height="50" fill="transparent"/>
    
    <!-- Status icon: checkmark -->
    <circle cx="25" cy="55" r="7" class="status-completed"/>
    <path d="M22,55 L24,57 L28,53" stroke="#161b22" stroke-width="2" fill="none"/>
    
    <!-- Task info -->
    <text x="45" y="52" class="task-text">fix-auth-bug</text>
    <text x="45" y="67" class="task-time">✅ completed · 12 min</text>
    
    <!-- Progress indicator -->
    <rect x="45" y="70" width="200" height="2" fill="#21262d" rx="1"/>
    <rect x="45" y="70" width="200" height="2" class="status-completed" rx="1"/>
  </g>
  
  <!-- Task 2: add-search (running) -->
  <g class="task-entry">
    <rect x="0" y="85" width="280" height="50" fill="transparent"/>
    
    <!-- Status icon: spinner -->
    <circle cx="25" cy="105" r="7" fill="transparent" stroke="#58a6ff" stroke-width="2"/>
    <path d="M25,98 A7,7 0 0,1 32,105" stroke="#58a6ff" stroke-width="2" fill="none" class="spinner"/>
    
    <!-- Task info -->
    <text x="45" y="102" class="task-text">add-search</text>
    <text x="45" y="117" class="task-time">🔄 running · 3 min</text>
    
    <!-- Progress indicator -->
    <rect x="45" y="120" width="200" height="2" fill="#21262d" rx="1"/>
    <rect x="45" y="120" width="120" height="2" class="status-running" rx="1"/>
  </g>
  
  <!-- Task 3: refactor-api (completed) -->
  <g class="task-entry">
    <rect x="0" y="135" width="280" height="50" fill="transparent"/>
    
    <!-- Status icon: checkmark -->
    <circle cx="25" cy="155" r="7" class="status-completed"/>
    <path d="M22,155 L24,157 L28,153" stroke="#161b22" stroke-width="2" fill="none"/>
    
    <!-- Task info -->
    <text x="45" y="152" class="task-text">refactor-api</text>
    <text x="45" y="167" class="task-time">✅ completed · 8 min</text>
    
    <!-- Progress indicator -->
    <rect x="45" y="170" width="200" height="2" fill="#21262d" rx="1"/>
    <rect x="45" y="170" width="200" height="2" class="status-completed" rx="1"/>
  </g>
  
  <!-- Bottom section with summary -->
  <rect x="0" y="200" width="280" height="35" fill="#21262d"/>
  <text x="15" y="220" class="task-time">3 agents · 2 completed · 1 running</text>
  
  <!-- Main content area hint -->
  <rect x="280" y="0" width="200" height="300" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="380" y="150" text-anchor="middle" class="task-time">Editor</text>
</svg>