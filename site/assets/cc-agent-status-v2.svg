<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" role="img" aria-labelledby="as2title as2desc">
  <title id="as2title">Command Central Agent Control Tower</title>
  <desc id="as2desc">Full VS Code sidebar showing agents grouped by project with status sections, per-agent model display, diff counts, and time groupings.</desc>
  <defs>
    <style>
      .bg { fill: #161b22; }
      .section-hdr { fill: #1c2128; }
      .bright { fill: #e6edf3; font-family: "Space Grotesk", system-ui, sans-serif; }
      .muted { fill: #8b949e; font-family: "Space Grotesk", system-ui, sans-serif; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
      .red { fill: #f85149; }
      .yellow { fill: #d29922; }
      .mono { font-family: "Cascadia Code", Consolas, monospace; }
      .indent { stroke: #30363d; stroke-width: 1; }
      .row-alt { fill: rgba(255,255,255,0.018); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="400" rx="14" class="bg" stroke="#30363d" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="480" height="32" rx="14" fill="#21262d"/>
  <rect x="0" y="16" width="480" height="16" fill="#21262d"/>
  <circle cx="18" cy="16" r="4" fill="#f85149"/>
  <circle cx="32" cy="16" r="4" fill="#d29922"/>
  <circle cx="46" cy="16" r="4" fill="#3fb950"/>
  <text x="240" y="21" class="muted" font-size="11" text-anchor="middle">AGENT STATUS — Command Central</text>

  <!-- Toolbar row -->
  <rect x="0" y="32" width="480" height="22" fill="#21262d" stroke="#30363d" stroke-width="0" />
  <line x1="0" y1="32" x2="480" y2="32" stroke="#30363d" stroke-width="1"/>
  <text x="12" y="47" class="muted" font-size="9" letter-spacing="1.2" font-weight="600">AGENTS</text>
  <!-- Clear Completed button -->
  <rect x="388" y="36" width="80" height="14" rx="7" fill="rgba(88,166,255,0.08)" stroke="rgba(88,166,255,0.2)" stroke-width="0.8"/>
  <text x="428" y="46" class="accent" font-size="8" text-anchor="middle">Clear Completed</text>

  <!-- ════════ PROJECT 1: 🚀 MY-APP ════════ -->
  <rect x="0" y="54" width="480" height="26" class="section-hdr"/>
  <text x="12" y="71" font-size="15">🚀</text>
  <text x="34" y="72" class="bright" font-size="13" font-weight="700">MY-APP</text>
  <text x="90" y="71" class="muted" font-size="10">▼</text>
  <!-- launch btn -->
  <rect x="434" y="59" width="20" height="16" rx="4" fill="rgba(88,166,255,0.1)" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="444" y="70" class="accent" font-size="10" text-anchor="middle">▶</text>
  <!-- count badge -->
  <rect x="456" y="60" width="18" height="14" rx="7" fill="rgba(88,166,255,0.12)" stroke="rgba(88,166,255,0.3)" stroke-width="0.8"/>
  <text x="465" y="70" class="accent" font-size="9" text-anchor="middle">8</text>

  <!-- ── Running section ── -->
  <rect x="0" y="80" width="480" height="16" fill="rgba(63,185,80,0.07)"/>
  <line x1="22" y1="80" x2="22" y2="96" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
  <text x="30" y="91" fill="#3fb950" font-size="8" letter-spacing="0.8" font-weight="600">RUNNING</text>
  <rect x="82" y="83" width="14" height="10" rx="5" fill="rgba(63,185,80,0.2)"/>
  <text x="89" y="91" fill="#3fb950" font-size="7" text-anchor="middle">1</text>

  <!-- Running agent - expanded -->
  <rect x="0" y="96" width="480" height="66" fill="rgba(63,185,80,0.03)"/>
  <line x1="22" y1="96" x2="22" y2="162" stroke="#30363d" stroke-width="1"/>
  <line x1="42" y1="96" x2="42" y2="162" stroke="#30363d" stroke-width="1"/>

  <circle cx="33" cy="110" r="4.5" fill="#3fb950"/>
  <text x="52" y="114" class="bright" font-size="12" font-weight="600">code-review</text>
  <text x="120" y="114" class="muted" font-size="11"> · running ·</text>
  <text x="175" y="114" class="accent" font-size="11" font-weight="600"> 3m 42s</text>
  <!-- model badge -->
  <rect x="228" y="104" width="32" height="14" rx="7" fill="rgba(139,92,246,0.18)" stroke="rgba(139,92,246,0.4)" stroke-width="0.8"/>
  <text x="244" y="114" fill="#a78bfa" font-size="9" text-anchor="middle">opus</text>
  <!-- terminal icon -->
  <rect x="440" y="104" width="28" height="14" rx="4" fill="#21262d"/>
  <text x="454" y="114" class="muted" font-size="9" text-anchor="middle">⊞ log</text>

  <text x="52" y="130" class="muted" font-size="10">Review auth module changes</text>

  <text x="52" y="146" class="muted" font-size="10">6 files · </text>
  <text x="84" y="146" fill="#3fb950" font-size="10" font-family="Cascadia Code, monospace">+81</text>
  <text x="100" y="146" class="muted" font-size="10">/</text>
  <text x="105" y="146" fill="#f85149" font-size="10" font-family="Cascadia Code, monospace">-15</text>
  <text x="52" y="158" class="muted" font-size="10">Terminal: </text>
  <text x="96" y="158" class="bright" font-size="10">🚀 my-app</text>
  <text x="145" y="158" class="muted" font-size="10"> (Dock)</text>

  <!-- ── Completed: Today ── -->
  <rect x="0" y="162" width="480" height="16" fill="rgba(88,166,255,0.04)"/>
  <line x1="22" y1="162" x2="22" y2="178" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="173" class="muted" font-size="8" letter-spacing="0.8" font-weight="600">COMPLETED</text>
  <text x="88" y="173" class="muted" font-size="8"> · Today</text>
  <rect x="124" y="165" width="14" height="10" rx="5" fill="rgba(88,166,255,0.1)"/>
  <text x="131" y="173" class="accent" font-size="7" text-anchor="middle">2</text>

  <!-- auth-refactor (Today) -->
  <rect x="0" y="178" width="480" height="28" class="row-alt"/>
  <line x1="22" y1="178" x2="22" y2="206" stroke="#30363d" stroke-width="1"/>
  <text x="33" y="196" fill="#3fb950" font-size="11">✓</text>
  <text x="48" y="196" class="bright" font-size="12">auth-refactor</text>
  <text x="128" y="196" class="muted" font-size="11"> · 12m ·</text>
  <rect x="178" y="186" width="50" height="14" rx="7" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="0.8"/>
  <text x="203" y="196" fill="#4ade80" font-size="9" text-anchor="middle">codex-5.4</text>
  <text x="240" y="196" class="muted" font-size="10">12 files · </text>
  <text x="278" y="196" fill="#3fb950" font-size="10" font-family="Cascadia Code, monospace">+340</text>
  <text x="302" y="196" class="muted" font-size="10">/</text>
  <text x="307" y="196" fill="#f85149" font-size="10" font-family="Cascadia Code, monospace">-87</text>
  <rect x="420" y="186" width="48" height="14" rx="4" fill="rgba(63,185,80,0.08)" stroke="rgba(63,185,80,0.2)" stroke-width="0.8"/>
  <text x="444" y="196" fill="#3fb950" font-size="8" text-anchor="middle">committed</text>

  <!-- test-suite (Today) -->
  <line x1="22" y1="206" x2="22" y2="234" stroke="#30363d" stroke-width="1"/>
  <text x="33" y="222" fill="#3fb950" font-size="11">✓</text>
  <text x="48" y="222" class="bright" font-size="12">test-suite</text>
  <text x="108" y="222" class="muted" font-size="11"> · 7m ·</text>
  <rect x="148" y="212" width="32" height="14" rx="7" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="0.8"/>
  <text x="164" y="222" fill="#a78bfa" font-size="9" text-anchor="middle">opus</text>
  <text x="192" y="222" class="muted" font-size="10">4 files · </text>
  <text x="224" y="222" fill="#3fb950" font-size="10" font-family="Cascadia Code, monospace">+62</text>
  <text x="243" y="222" class="muted" font-size="10">/</text>
  <text x="248" y="222" fill="#f85149" font-size="10" font-family="Cascadia Code, monospace">-8</text>

  <!-- ── Completed: Yesterday ── -->
  <rect x="0" y="234" width="480" height="16" fill="rgba(88,166,255,0.04)"/>
  <line x1="22" y1="234" x2="22" y2="250" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="245" class="muted" font-size="8" letter-spacing="0.8" font-weight="600">COMPLETED</text>
  <text x="88" y="245" class="muted" font-size="8"> · Yesterday</text>
  <rect x="138" y="237" width="14" height="10" rx="5" fill="rgba(88,166,255,0.1)"/>
  <text x="145" y="245" class="accent" font-size="7" text-anchor="middle">1</text>

  <!-- test-coverage (Yesterday) -->
  <rect x="0" y="250" width="480" height="26" class="row-alt"/>
  <line x1="22" y1="250" x2="22" y2="276" stroke="#30363d" stroke-width="1"/>
  <text x="33" y="267" fill="#3fb950" font-size="11">✓</text>
  <text x="48" y="267" class="bright" font-size="12">test-coverage</text>
  <text x="136" y="267" class="muted" font-size="11"> · 8m ·</text>
  <rect x="176" y="257" width="32" height="14" rx="7" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="0.8"/>
  <text x="192" y="267" fill="#a78bfa" font-size="9" text-anchor="middle">opus</text>

  <!-- ── Older (collapsed) ── -->
  <rect x="0" y="276" width="480" height="22" fill="rgba(30,30,30,0.3)"/>
  <line x1="22" y1="276" x2="22" y2="298" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="290" class="muted" font-size="10">▶  Older</text>
  <rect x="66" y="280" width="28" height="13" rx="6" fill="rgba(139,147,158,0.12)"/>
  <text x="80" y="290" class="muted" font-size="9" text-anchor="middle">(47)</text>

  <!-- ════════ PROJECT 2: ⚙️ API-SERVER (collapsed) ════════ -->
  <rect x="0" y="298" width="480" height="26" class="section-hdr"/>
  <line x1="0" y1="298" x2="480" y2="298" stroke="#30363d" stroke-width="1"/>
  <text x="12" y="315" font-size="15">⚙️</text>
  <text x="34" y="316" class="muted" font-size="13" font-weight="600">API-SERVER</text>
  <text x="110" y="315" class="muted" font-size="10">▶</text>
  <rect x="436" y="303" width="18" height="14" rx="7" fill="rgba(139,147,158,0.1)" stroke="rgba(139,147,158,0.2)" stroke-width="0.8"/>
  <text x="445" y="313" class="muted" font-size="9" text-anchor="middle">2</text>

  <!-- PROJECT 3: 📊 DATA-PIPELINE (collapsed) -->
  <rect x="0" y="324" width="480" height="26" class="section-hdr"/>
  <line x1="0" y1="324" x2="480" y2="324" stroke="#30363d" stroke-width="1"/>
  <text x="12" y="341" font-size="15">📊</text>
  <text x="34" y="342" class="muted" font-size="13" font-weight="600">DATA-PIPELINE</text>
  <text x="126" y="341" class="muted" font-size="10">▶</text>

  <!-- Footer caption -->
  <rect x="0" y="350" width="480" height="50" rx="0" fill="#0d1117"/>
  <rect x="0" y="374" width="480" height="26" rx="0" fill="#0d1117"/>
  <rect x="0" y="350" width="480" height="2" fill="#21262d"/>
  <text x="240" y="368" class="muted" font-size="11" text-anchor="middle">Per-project grouping · Model per agent · Time groupings · One-click focus</text>
  <text x="240" y="386" class="accent" font-size="10" text-anchor="middle">Click any row to focus the exact terminal window</text>
</svg>
