<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .bg { fill: #161b22; }
      .header-bar { fill: #21262d; }
      .section-bg { fill: #1c2128; }
      .row-alt { fill: #1c2128; opacity: 0.4; }
      .bright { fill: #e6edf3; font-family: system-ui, -apple-system, sans-serif; }
      .muted { fill: #8b949e; font-family: system-ui, -apple-system, sans-serif; }
      .accent { fill: #58a6ff; font-family: system-ui, -apple-system, sans-serif; }
      .green { fill: #3fb950; }
      .yellow { fill: #d29922; }
      .red { fill: #f85149; }
      .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
      .indent { stroke: #30363d; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="280" class="bg"/>

  <!-- ═══════ Project: 🚀 MY-APP ═══════ -->
  <rect x="0" y="20" width="480" height="30" class="section-bg"/>
  <text x="12" y="40" font-size="16">🚀</text>
  <text x="34" y="40" class="bright" font-size="14" font-weight="700">MY-APP</text>
  <text x="108" y="40" class="muted" font-size="11">▼</text>
  <text x="128" y="40" class="muted" font-size="12">(8)</text>
  <!-- Launch Terminal Button -->
  <rect x="440" y="30" width="24" height="16" rx="3" fill="#58a6ff" opacity="0.1" stroke="#58a6ff" stroke-width="1"/>
  <text x="452" y="41" class="accent" font-size="12" text-anchor="middle">▶</text>

  <!-- Agent Status (EXPANDED) -->
  <rect x="0" y="50" width="480" height="80" fill="rgba(88, 166, 255, 0.05)"/>
  <line x1="34" y1="50" x2="34" y2="130" class="indent"/>
  
  <!-- Agent header -->
  <text x="46" y="67" class="green" font-size="10">🟢</text>
  <text x="64" y="67" class="bright" font-size="13" font-weight="600">Agent: code-review</text>
  <text x="400" y="67" class="accent" font-size="12" text-anchor="end">running</text>

  <!-- Task description -->
  <line x1="64" y1="70" x2="64" y2="130" class="indent"/>
  <text x="76" y="85" class="muted" font-size="11">Task:</text>
  <text x="110" y="85" class="bright" font-size="12">Review auth module changes</text>

  <!-- Duration -->
  <text x="76" y="101" class="muted" font-size="11">Duration:</text>
  <text x="130" y="101" class="accent" font-size="12" font-weight="600">3m 42s</text>

  <!-- Terminal reference -->
  <text x="76" y="117" class="muted" font-size="11">Terminal:</text>
  <text x="130" y="117" class="bright" font-size="12">🚀 my-app</text>
  <text x="210" y="117" class="muted" font-size="11">(Dock)</text>

  <!-- Staged Section -->
  <rect x="0" y="130" width="480" height="24" fill="transparent"/>
  <line x1="34" y1="130" x2="34" y2="154" class="indent"/>
  <text x="46" y="147" class="green" font-size="10">●</text>
  <text x="64" y="147" class="bright" font-size="12" font-weight="600">Staged</text>
  <text x="118" y="147" class="muted" font-size="11">• 3 ready to commit</text>

  <!-- Today (Staged) -->
  <text x="62" y="170" class="accent" font-size="11" font-weight="600">Today (2 files)</text>

  <!-- auth.ts -->
  <rect x="0" y="176" width="480" height="26" fill="transparent"/>
  <line x1="34" y1="176" x2="34" y2="202" class="indent"/>
  <line x1="62" y1="176" x2="62" y2="202" class="indent"/>
  <rect x="72" y="182" width="20" height="13" rx="2" fill="#519aba" opacity="0.2"/>
  <text x="82" y="191" fill="#519aba" font-size="8" font-weight="700" text-anchor="middle">TS</text>
  <text x="98" y="191" class="bright mono" font-size="12">auth.ts</text>
  <text x="260" y="191" class="muted" font-size="11">now</text>
  <text x="464" y="191" class="green" font-size="12" font-weight="700" text-anchor="end" font-family="monospace">A</text>

  <!-- config.ts -->
  <rect x="0" y="202" width="480" height="26" class="row-alt"/>
  <line x1="34" y1="202" x2="34" y2="228" class="indent"/>
  <line x1="62" y1="202" x2="62" y2="228" class="indent"/>
  <rect x="72" y="208" width="20" height="13" rx="2" fill="#519aba" opacity="0.2"/>
  <text x="82" y="217" fill="#519aba" font-size="8" font-weight="700" text-anchor="middle">TS</text>
  <text x="98" y="217" class="bright mono" font-size="12">config.ts</text>
  <text x="260" y="217" class="muted" font-size="11">1h ago</text>
  <text x="464" y="217" class="yellow" font-size="12" font-weight="700" text-anchor="end" font-family="monospace">M</text>
</svg>