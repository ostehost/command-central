<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-labelledby="fmtitle fmdesc">
  <title id="fmtitle">Model visibility — see opus, codex-5.4, and gemini-pro inline on every agent</title>
  <desc id="fmdesc">Three agent cards side by side showing planning/opus in purple, implementing/codex-5.4 in green, and reviewing/gemini-pro in blue. Below, an expanded detail for the planning agent shows the full model name, duration, and file change counts.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2235"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Cascadia Code', Consolas, monospace; }
    </style>
  </defs>

  <rect width="520" height="200" rx="14" fill="url(#bgGrad)"/>
  <circle cx="90" cy="40" r="60" fill="#a371f7" opacity="0.05"/>
  <circle cx="430" cy="40" r="60" fill="#58a6ff" opacity="0.04"/>

  <!-- ═══ Card 1: 🟣 planning · opus · 🚀 my-app · 2m ═══ -->
  <g filter="url(#shadow)">
    <rect x="12" y="12" width="156" height="56" rx="8" fill="#1c2128" stroke="rgba(163,113,247,0.35)" stroke-width="1"/>
    <!-- Running indicator + task name -->
    <circle cx="26" cy="32" r="5" fill="#a371f7"/>
    <text x="36" y="36" fill="#e6edf3" font-size="12">planning</text>
    <!-- Model badge -->
    <rect x="96" y="27" width="30" height="12" rx="6" fill="rgba(163,113,247,0.15)" stroke="rgba(163,113,247,0.4)" stroke-width="0.8"/>
    <text x="111" y="36" fill="#a371f7" font-size="8" text-anchor="middle">opus</text>
    <!-- Project + duration -->
    <text x="22" y="54" font-size="10">🚀</text>
    <text x="36" y="54" fill="#8b949e" font-size="9">my-app · 2m</text>
    <!-- Expand indicator -->
    <text x="158" y="44" fill="#8b949e" font-size="10" text-anchor="middle">▾</text>
  </g>

  <!-- ═══ Card 2: 🟢 implementing · codex-5.4 · ⚙️ api-server · 5m ═══ -->
  <g filter="url(#shadow)">
    <rect x="182" y="12" width="156" height="56" rx="8" fill="#1c2128" stroke="rgba(63,185,80,0.3)" stroke-width="1"/>
    <circle cx="196" cy="32" r="5" fill="#3fb950"/>
    <text x="206" y="36" fill="#e6edf3" font-size="12">implementing</text>
    <!-- codex-5.4 badge -->
    <rect x="300" y="27" width="34" height="12" rx="6" fill="rgba(63,185,80,0.1)" stroke="rgba(63,185,80,0.25)" stroke-width="0.8"/>
    <text x="317" y="36" fill="#4ade80" font-size="8" text-anchor="middle">codex-5.4</text>
    <!-- Project + duration -->
    <text x="192" y="54" font-size="10">⚙️</text>
    <text x="206" y="54" fill="#8b949e" font-size="9">api-server · 5m</text>
  </g>

  <!-- ═══ Card 3: 🔵 reviewing · gemini-pro · 📊 dashboard · 1m ═══ -->
  <g filter="url(#shadow)">
    <rect x="352" y="12" width="156" height="56" rx="8" fill="#1c2128" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
    <circle cx="366" cy="32" r="5" fill="#58a6ff"/>
    <text x="376" y="36" fill="#e6edf3" font-size="12">reviewing</text>
    <!-- gemini-pro badge -->
    <rect x="450" y="27" width="46" height="12" rx="6" fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.25)" stroke-width="0.8"/>
    <text x="473" y="36" fill="#60a5fa" font-size="8" text-anchor="middle">gemini-pro</text>
    <!-- Project + duration -->
    <text x="362" y="54" font-size="10">📊</text>
    <text x="376" y="54" fill="#8b949e" font-size="9">dashboard · 1m</text>
  </g>

  <!-- Connector: dashed line from card 1 to expanded detail -->
  <line x1="90" y1="68" x2="90" y2="82" stroke="rgba(163,113,247,0.45)" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="90" cy="82" r="2" fill="rgba(163,113,247,0.6)"/>

  <!-- ═══ Expanded detail for Card 1 (planning/opus) ═══ -->
  <g filter="url(#shadow)">
    <rect x="12" y="82" width="496" height="106" rx="10" fill="#1c2128" stroke="rgba(163,113,247,0.3)" stroke-width="1"/>

    <!-- Header: agent + model badge -->
    <circle cx="30" cy="100" r="5" fill="#a371f7"/>
    <text x="40" y="105" fill="#e6edf3" font-size="12" font-weight="600">planning</text>
    <rect x="98" y="95" width="30" height="12" rx="6" fill="rgba(163,113,247,0.15)" stroke="rgba(163,113,247,0.4)" stroke-width="0.8"/>
    <text x="113" y="104" fill="#a371f7" font-size="8" text-anchor="middle">opus</text>
    <text x="140" y="104" fill="#8b949e" font-size="10">2m 14s running</text>

    <!-- Divider -->
    <line x1="22" y1="112" x2="496" y2="112" stroke="#30363d" stroke-width="1" opacity="0.6"/>

    <!-- Detail rows -->
    <text x="26" y="128" fill="#8b949e" font-size="10">Model</text>
    <text x="90" y="128" fill="#e6edf3" font-size="10" class="mono">anthropic/claude-opus-4-6</text>
    <text x="336" y="128" fill="#8b949e" font-size="10">(explicit)</text>

    <text x="26" y="148" fill="#8b949e" font-size="10">Duration</text>
    <text x="90" y="148" fill="#e6edf3" font-size="10" class="mono">2m 14s</text>

    <text x="26" y="168" fill="#8b949e" font-size="10">Changes</text>
    <text x="90" y="168" fill="#8b949e" font-size="10">6 files ·</text>
    <text x="133" y="168" fill="#3fb950" font-size="10" class="mono">+81</text>
    <text x="157" y="168" fill="#8b949e" font-size="10">/</text>
    <text x="164" y="168" fill="#f85149" font-size="10" class="mono">-15</text>
  </g>

</svg>
