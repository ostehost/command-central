<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" role="img" aria-labelledby="title desc">
  <title id="title">Cmd+Tab continuity mockup</title>
  <desc id="desc">VS Code and a project terminal use the same icon and task identity, with Cmd+Tab switching between them.</desc>
  <defs>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c222b"/>
      <stop offset="100%" stop-color="#131920"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#58a6ff" flood-opacity="0.32"/>
    </filter>
    <style>
      .frame { fill: url(#window); stroke: #30363d; stroke-width: 1; }
      .titlebar { fill: #21262d; }
      .bright { fill: #e6edf3; font-family: "Space Grotesk", "Inter", system-ui, sans-serif; }
      .text { fill: #c9d1d9; font-family: "Inter", system-ui, sans-serif; }
      .muted { fill: #8b949e; font-family: "Inter", system-ui, sans-serif; }
      .mono { fill: #c9d1d9; font-family: "SFMono-Regular", "Cascadia Code", Consolas, monospace; }
      .accent { fill: #58a6ff; }
    </style>
  </defs>

  <rect width="420" height="240" rx="20" fill="#161b22"/>
  <circle cx="88" cy="205" r="74" fill="#58a6ff" opacity="0.06"/>
  <circle cx="332" cy="36" r="68" fill="#3fb950" opacity="0.05"/>

  <g filter="url(#shadow)">
    <rect x="20" y="74" width="136" height="110" rx="16" class="frame"/>
    <rect x="20" y="74" width="136" height="28" rx="16" class="titlebar"/>
    <text x="34" y="92" fill="#fff" font-size="11">&lt;/&gt;</text>
    <text x="50" y="92" class="bright" font-size="12" font-weight="700">VS Code</text>
    <rect x="36" y="114" width="38" height="8" rx="4" fill="#58a6ff" opacity="0.18"/>
    <rect x="36" y="130" width="70" height="10" rx="5" fill="#1c252f"/>
    <text x="44" y="138" font-size="11">🚀</text>
    <text x="60" y="138" class="text" font-size="10">partner-web</text>
    <rect x="36" y="148" width="90" height="16" rx="8" fill="rgba(88, 166, 255, 0.12)" stroke="rgba(88, 166, 255, 0.24)"/>
    <text x="46" y="159" class="accent" font-size="9">refactor auth is running</text>

    <rect x="264" y="74" width="136" height="110" rx="16" class="frame"/>
    <rect x="264" y="74" width="136" height="28" rx="16" class="titlebar"/>
    <text x="278" y="92" font-size="12">🚀</text>
    <text x="296" y="92" class="bright" font-size="12" font-weight="700">partner-web</text>
    <text x="280" y="124" class="mono" font-size="10">$ codex --continue</text>
    <text x="280" y="144" class="mono" font-size="10">updating lifecycle controls</text>
    <text x="280" y="164" class="mono" font-size="10">5 files  +118 / -24</text>

    <rect x="122" y="26" width="176" height="72" rx="18" fill="rgba(13, 17, 23, 0.94)" stroke="rgba(88, 166, 255, 0.24)" filter="url(#glow)"/>
    <text x="210" y="48" class="bright" font-size="12" text-anchor="middle" font-weight="700">⌘ Tab</text>
    <rect x="142" y="56" width="38" height="24" rx="9" fill="#007acc"/>
    <text x="161" y="72" fill="#fff" font-size="11" text-anchor="middle">&lt;/&gt;</text>
    <rect x="190" y="52" width="44" height="32" rx="11" fill="rgba(88, 166, 255, 0.2)" stroke="rgba(88, 166, 255, 0.36)"/>
    <text x="212" y="73" font-size="17" text-anchor="middle">🚀</text>
    <rect x="244" y="56" width="38" height="24" rx="9" fill="#11161f"/>
    <text x="263" y="72" fill="#e6edf3" font-size="10" text-anchor="middle">&gt;_</text>

    <path d="M176 90 C160 118 148 122 136 126" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.55"/>
    <path d="M244 90 C262 118 278 122 292 126" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.55"/>
    <text x="210" y="208" class="muted" font-size="11" text-anchor="middle">same icon, same task, no window hunting</text>
  </g>
</svg>
