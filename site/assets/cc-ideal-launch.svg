<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .bg { fill: #161b22; }
      .header-bar { fill: #21262d; }
      .section-bg { fill: #1c2128; }
      .row-alt { fill: #1c2128; opacity: 0.4; }
      .bright { fill: #e6edf3; font-family: system-ui, -apple-system, sans-serif; }
      .muted { fill: #8b949e; font-family: system-ui, -apple-system, sans-serif; }
      .accent { fill: #58a6ff; font-family: system-ui, -apple-system, sans-serif; }
      .green { fill: #3fb950; }
      .yellow { fill: #d29922; }
      .red { fill: #f85149; }
      .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
      .indent { stroke: #30363d; stroke-width: 1; }
    </style>
    <!-- Glow filter for button highlight -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="200" class="bg"/>

  <!-- Top Section: VS Code Interface -->
  <rect x="0" y="0" width="480" height="100" class="bg"/>

  <!-- ═══════ Project Header with Highlighted Button ═══════ -->
  <rect x="0" y="20" width="480" height="30" class="section-bg"/>
  <text x="12" y="40" font-size="16">🚀</text>
  <text x="34" y="40" class="bright" font-size="14" font-weight="700">MY-APP</text>
  <text x="108" y="40" class="muted" font-size="11">▼</text>
  <text x="128" y="40" class="muted" font-size="12">(8)</text>

  <!-- Highlighted Launch Terminal Button with Glow -->
  <circle cx="452" cy="35" r="12" fill="#58a6ff" opacity="0.2"/>
  <circle cx="452" cy="35" r="8" fill="#58a6ff" opacity="0.1" filter="url(#glow)"/>
  <text x="452" y="39" class="accent" font-size="14" text-anchor="middle" font-weight="700" filter="url(#glow)">▶</text>

  <!-- Divider line -->
  <line x1="0" y1="80" x2="480" y2="80" stroke="#30363d" stroke-width="1"/>

  <!-- Bottom Section: macOS Dock -->
  <rect x="0" y="100" width="480" height="100" fill="#000000" opacity="0.3"/>
  
  <!-- Dock background -->
  <rect x="140" y="140" width="200" height="40" rx="20" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-width="0.5"/>
  
  <!-- Existing Dock Icons -->
  <!-- Finder -->
  <rect x="150" y="148" width="24" height="24" rx="6" fill="#42A5F5"/>
  <text x="162" y="163" fill="white" font-size="12" text-anchor="middle">⌘</text>

  <!-- VS Code -->
  <rect x="182" y="148" width="24" height="24" rx="6" fill="#007ACC"/>
  <text x="194" y="163" fill="white" font-size="8" text-anchor="middle">⟨⟩</text>

  <!-- NEW: Project Terminal (highlighted with pulsing effect) -->
  <rect x="214" y="148" width="24" height="24" rx="6" fill="#58a6ff" opacity="0.9"/>
  <circle cx="226" cy="160" r="16" fill="#58a6ff" opacity="0.3"/>
  <circle cx="226" cy="160" r="20" fill="#58a6ff" opacity="0.1"/>
  <text x="226" y="163" font-size="12" text-anchor="middle">🚀</text>

  <!-- Chrome -->
  <rect x="246" y="148" width="24" height="24" rx="6" fill="#DB4437"/>
  <circle cx="258" cy="160" r="6" fill="white"/>
  <circle cx="258" cy="160" r="3" fill="#4285F4"/>

  <!-- Terminal -->
  <rect x="278" y="148" width="24" height="24" rx="6" fill="#000000"/>
  <text x="290" y="163" fill="white" font-size="8" text-anchor="middle">></text>

  <!-- Dock Labels -->
  <text x="162" y="185" class="muted" font-size="9" text-anchor="middle">Finder</text>
  <text x="194" y="185" class="muted" font-size="9" text-anchor="middle">Code</text>
  <text x="226" y="185" class="accent" font-size="9" text-anchor="middle" font-weight="600">my-app</text>
  <text x="258" y="185" class="muted" font-size="9" text-anchor="middle">Chrome</text>
  <text x="290" y="185" class="muted" font-size="9" text-anchor="middle">Terminal</text>

  <!-- Launch indicator arrow -->
  <path d="M 452 55 Q 350 80 226 135" stroke="#58a6ff" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="5,3"/>
  <polygon points="220,130 226,135 230,132" fill="#58a6ff" opacity="0.6"/>

  <!-- Status text -->
  <text x="240" y="25" class="accent" font-size="11" text-anchor="middle">Launching terminal...</text>
</svg>