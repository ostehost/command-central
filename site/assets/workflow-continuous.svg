<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" role="img" aria-labelledby="title desc">
  <title id="title">Continuous editor and terminal workflow mockup</title>
  <desc id="desc">A shared workspace where the sidebar, editor, and terminal are visually connected as one flow.</desc>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c222b"/>
      <stop offset="100%" stop-color="#131920"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .frame { fill: url(#shell); stroke: #30363d; stroke-width: 1; }
      .titlebar { fill: #21262d; }
      .editor { fill: #10161f; }
      .terminal { fill: #0d131b; }
      .sidebar { fill: #151b23; }
      .bright { fill: #e6edf3; font-family: "Space Grotesk", "Inter", system-ui, sans-serif; }
      .text { fill: #c9d1d9; font-family: "Inter", system-ui, sans-serif; }
      .muted { fill: #8b949e; font-family: "Inter", system-ui, sans-serif; }
      .mono { fill: #c9d1d9; font-family: "SFMono-Regular", "Cascadia Code", Consolas, monospace; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
    </style>
  </defs>

  <rect width="420" height="240" rx="20" fill="#161b22"/>
  <circle cx="48" cy="38" r="70" fill="#58a6ff" opacity="0.08"/>
  <circle cx="332" cy="212" r="72" fill="#58a6ff" opacity="0.05"/>

  <g filter="url(#shadow)">
    <rect x="18" y="18" width="384" height="186" rx="20" class="frame"/>
    <rect x="18" y="18" width="384" height="30" rx="20" class="titlebar"/>
    <text x="34" y="38" class="muted" font-size="10" letter-spacing="1.2">COMMAND CENTRAL</text>
    <text x="320" y="38" class="muted" font-size="10">one continuous workflow</text>

    <rect x="18" y="48" width="42" height="156" class="sidebar"/>
    <rect x="60" y="48" width="170" height="156" class="editor"/>
    <rect x="230" y="48" width="172" height="156" class="terminal"/>

    <rect x="26" y="62" width="26" height="26" rx="9" fill="rgba(88, 166, 255, 0.18)" stroke="rgba(88, 166, 255, 0.3)"/>
    <text x="39" y="79" font-size="14" text-anchor="middle">🚀</text>
    <rect x="26" y="96" width="26" height="26" rx="9" fill="#21262d"/>
    <text x="39" y="113" font-size="13" text-anchor="middle">⚡</text>

    <rect x="72" y="60" width="146" height="24" rx="9" fill="#151b23" stroke="#2c3440"/>
    <text x="84" y="76" class="bright" font-size="11" font-weight="700">auth-flow.ts</text>
    <rect x="84" y="96" width="76" height="16" rx="8" fill="rgba(88, 166, 255, 0.12)"/>
    <text x="94" y="108" class="accent" font-size="9">partner-web</text>
    <rect x="166" y="96" width="44" height="16" rx="8" fill="rgba(63, 185, 80, 0.12)"/>
    <text x="176" y="108" class="green" font-size="9">live agent</text>

    <text x="74" y="134" class="mono" font-size="10">discoverAgents()</text>
    <text x="86" y="152" class="mono" font-size="10">.map(groupByProject)</text>
    <text x="86" y="170" class="mono" font-size="10">.withLifecycleControls()</text>

    <rect x="248" y="60" width="136" height="22" rx="9" fill="#151b23" stroke="#2c3440"/>
    <text x="260" y="75" font-size="12">🚀</text>
    <text x="278" y="75" class="bright" font-size="11" font-weight="700">partner-web terminal</text>
    <text x="248" y="106" class="mono" font-size="10">$ codex --continue</text>
    <text x="248" y="126" class="mono" font-size="10">editing sidebar + dock assets</text>
    <text x="248" y="146" class="mono" font-size="10">streaming diff summary...</text>

    <path d="M210 120 C226 120 232 120 248 120" fill="none" stroke="#58a6ff" stroke-width="3" opacity="0.6"/>
    <rect x="154" y="112" width="98" height="18" rx="9" fill="rgba(88, 166, 255, 0.14)" stroke="rgba(88, 166, 255, 0.28)"/>
    <text x="203" y="125" class="accent" font-size="9" text-anchor="middle">same task context</text>

    <rect x="72" y="178" width="312" height="14" rx="7" fill="#171c24"/>
    <rect x="72" y="178" width="198" height="14" rx="7" fill="rgba(88, 166, 255, 0.18)"/>
    <text x="228" y="220" class="muted" font-size="11" text-anchor="middle">editor state, agent status, and terminal output stay aligned</text>
  </g>
</svg>
