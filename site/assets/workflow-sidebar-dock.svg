<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" role="img" aria-labelledby="title desc">
  <title id="title">Per-project Dock anchors mockup</title>
  <desc id="desc">A Command Central sidebar grouped by project icons, linked to the same icons in the Dock.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c222b"/>
      <stop offset="100%" stop-color="#131920"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .frame { fill: url(#panel); stroke: #30363d; stroke-width: 1; }
      .titlebar { fill: #21262d; }
      .dock { fill: rgba(230, 237, 243, 0.1); stroke: rgba(230, 237, 243, 0.14); stroke-width: 1; }
      .bright { fill: #e6edf3; font-family: "Space Grotesk", "Inter", system-ui, sans-serif; }
      .text { fill: #c9d1d9; font-family: "Inter", system-ui, sans-serif; }
      .muted { fill: #8b949e; font-family: "Inter", system-ui, sans-serif; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
      .amber { fill: #d29922; }
    </style>
  </defs>

  <rect width="420" height="240" rx="20" fill="#161b22"/>
  <circle cx="64" cy="24" r="74" fill="#58a6ff" opacity="0.08"/>
  <circle cx="350" cy="208" r="70" fill="#58a6ff" opacity="0.06"/>

  <g filter="url(#shadow)">
    <rect x="20" y="18" width="380" height="164" rx="18" class="frame"/>
    <rect x="20" y="18" width="380" height="32" rx="18" class="titlebar"/>
    <text x="36" y="39" class="muted" font-size="10" letter-spacing="1.3">COMMAND CENTRAL</text>
    <text x="364" y="39" class="muted" font-size="10">project-first navigation</text>

    <rect x="36" y="64" width="348" height="34" rx="12" fill="rgba(88, 166, 255, 0.12)" stroke="rgba(88, 166, 255, 0.24)"/>
    <text x="50" y="86" font-size="15">🚀</text>
    <text x="72" y="84" class="bright" font-size="13" font-weight="700">partner-web</text>
    <text x="72" y="99" class="muted" font-size="10">codex, claude, gemini</text>
    <circle cx="250" cy="81" r="4" class="green"/>
    <text x="260" y="85" class="text" font-size="11">2 running</text>
    <rect x="338" y="71" width="24" height="20" rx="7" fill="rgba(88, 166, 255, 0.16)"/>
    <text x="350" y="85" class="accent" font-size="12" text-anchor="middle">▶</text>

    <rect x="36" y="106" width="348" height="28" rx="12" fill="#171c24"/>
    <text x="50" y="124" font-size="15">⚡</text>
    <text x="72" y="124" class="bright" font-size="13" font-weight="700">billing-api</text>
    <text x="172" y="124" class="muted" font-size="10">one completed · last 8m ago</text>
    <rect x="338" y="111" width="24" height="18" rx="7" fill="#21262d"/>
    <text x="350" y="124" class="muted" font-size="12" text-anchor="middle">▶</text>

    <rect x="36" y="142" width="348" height="28" rx="12" fill="#171c24"/>
    <text x="50" y="160" font-size="15">🧪</text>
    <text x="72" y="160" class="bright" font-size="13" font-weight="700">checkout-tests</text>
    <circle cx="243" cy="157" r="4" class="amber"/>
    <text x="253" y="161" class="muted" font-size="10">queued to launch</text>
    <rect x="338" y="147" width="24" height="18" rx="7" fill="#21262d"/>
    <text x="350" y="160" class="muted" font-size="12" text-anchor="middle">▶</text>

    <path d="M82 182 C82 194 82 198 112 198" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
    <path d="M82 182 C82 194 176 198 176 198" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.24"/>
    <path d="M82 182 C82 194 240 198 240 198" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.16"/>

    <rect x="112" y="190" width="196" height="32" rx="16" class="dock"/>
    <rect x="132" y="195" width="22" height="22" rx="7" fill="rgba(88, 166, 255, 0.18)" stroke="rgba(88, 166, 255, 0.34)"/>
    <text x="143" y="210" font-size="14" text-anchor="middle">🚀</text>
    <rect x="164" y="197" width="18" height="18" rx="6" fill="#21262d"/>
    <text x="173" y="210" font-size="12" text-anchor="middle">⚡</text>
    <rect x="192" y="197" width="18" height="18" rx="6" fill="#21262d"/>
    <text x="201" y="210" font-size="12" text-anchor="middle">🧪</text>
    <rect x="220" y="197" width="18" height="18" rx="6" fill="#21262d"/>
    <text x="229" y="210" fill="#e6edf3" font-size="10" text-anchor="middle">&gt;_</text>
    <text x="260" y="210" class="muted" font-size="10">same icon, same project anchor</text>
  </g>
</svg>
