<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" role="img" aria-labelledby="h3title h3desc">
  <title id="h3title">Command Central hero — see every agent, click to focus, know the model</title>
  <desc id="h3desc">VS Code sidebar with Agent Status panel showing running, completed, and failed agents across Claude, Codex, and Gemini, alongside a macOS Dock with per-project emoji icons.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2735"/>
      <stop offset="60%" stop-color="#121821"/>
      <stop offset="100%" stop-color="#0f141b"/>
    </linearGradient>
    <linearGradient id="linkLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="25%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="75%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#58a6ff" flood-opacity="0.4"/>
    </filter>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#3fb950" flood-opacity="0.35"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .bg { fill: #161b22; }
      .titlebar { fill: #21262d; }
      .activity { fill: #0d1117; }
      .sidebar { fill: #161b22; }
      .bright { fill: #e6edf3; font-family: "Space Grotesk", system-ui, sans-serif; }
      .muted { fill: #8b949e; font-family: "Space Grotesk", system-ui, sans-serif; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
      .red { fill: #f85149; }
      .yellow { fill: #d29922; }
      .mono { font-family: "Cascadia Code", Consolas, monospace; }
      .section-hdr { fill: #1c2128; }
    </style>
  </defs>

  <!-- Outer background -->
  <rect width="560" height="340" rx="20" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <circle cx="100" cy="60" r="80" fill="#58a6ff" opacity="0.07"/>
  <circle cx="460" cy="80" r="70" fill="#3fb950" opacity="0.06"/>
  <circle cx="440" cy="290" r="80" fill="#58a6ff" opacity="0.05"/>

  <!-- ═══ VS Code window (left panel) ═══ -->
  <g filter="url(#shadow)">
    <rect x="16" y="20" width="290" height="272" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <!-- Titlebar -->
    <rect x="16" y="20" width="290" height="30" rx="14" class="titlebar"/>
    <rect x="16" y="34" width="290" height="16" class="titlebar"/>
    <circle cx="34" cy="35" r="4" fill="#f85149"/>
    <circle cx="48" cy="35" r="4" fill="#d29922"/>
    <circle cx="62" cy="35" r="4" fill="#3fb950"/>
    <text x="160" y="40" class="muted" font-size="11" text-anchor="middle">command-central</text>

    <!-- Activity bar -->
    <rect x="16" y="50" width="20" height="242" class="activity"/>
    <!-- CC icon active -->
    <rect x="19" y="58" width="14" height="14" rx="3" fill="#58a6ff" opacity="0.25"/>
    <text x="26" y="68" fill="#58a6ff" font-size="8" text-anchor="middle" font-weight="700">CC</text>
    <rect x="19" y="80" width="14" height="14" rx="3" fill="#30363d" opacity="0.6"/>
    <rect x="19" y="100" width="14" height="14" rx="3" fill="#30363d" opacity="0.6"/>

    <!-- Sidebar panel -->
    <rect x="36" y="50" width="270" height="242" fill="#161b22"/>

    <!-- Panel title -->
    <text x="46" y="70" class="muted" font-size="9" letter-spacing="1.2" font-weight="600">AGENT STATUS</text>

    <!-- ── Project header: MY-APP ── -->
    <rect x="36" y="76" width="270" height="26" class="section-hdr"/>
    <text x="48" y="93" font-size="14">🚀</text>
    <text x="68" y="94" class="bright" font-size="12" font-weight="700">MY-APP</text>
    <text x="114" y="93" class="muted" font-size="10">▼</text>
    <rect x="252" y="81" width="16" height="16" rx="4" fill="rgba(88,166,255,0.12)" stroke="#58a6ff" stroke-width="0.8"/>
    <text x="260" y="92" class="accent" font-size="9" text-anchor="middle">▶</text>
    <rect x="270" y="82" width="22" height="14" rx="7" fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.3)" stroke-width="0.8"/>
    <text x="281" y="92" class="accent" font-size="9" text-anchor="middle">(3)</text>

    <!-- ── RUNNING section ── -->
    <rect x="36" y="102" width="270" height="16" fill="rgba(63,185,80,0.06)"/>
    <text x="48" y="113" fill="#3fb950" font-size="9" letter-spacing="0.8" font-weight="600">RUNNING</text>
    <rect x="188" y="105" width="16" height="10" rx="5" fill="rgba(63,185,80,0.15)"/>
    <text x="196" y="113" fill="#3fb950" font-size="8" text-anchor="middle">1</text>

    <!-- Running agent row -->
    <rect x="36" y="118" width="270" height="38" fill="rgba(63,185,80,0.04)"/>
    <circle cx="52" cy="131" r="4" fill="#3fb950" filter="url(#greenGlow)"/>
    <text x="62" y="135" class="bright" font-size="12" font-weight="500">code-review</text>
    <text x="135" y="135" class="muted" font-size="11"> · 3m</text>
    <rect x="164" y="126" width="28" height="13" rx="6" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.35)" stroke-width="0.8"/>
    <text x="178" y="135" fill="#a78bfa" font-size="9" text-anchor="middle">opus</text>
    <text x="52" y="149" class="muted" font-size="10">6 files · </text>
    <text x="86" y="149" fill="#3fb950" font-size="10" font-family="Cascadia Code, monospace">+81</text>
    <text x="102" y="149" class="muted" font-size="10">/</text>
    <text x="107" y="149" fill="#f85149" font-size="10" font-family="Cascadia Code, monospace">-15</text>

    <!-- ── COMPLETED section ── -->
    <rect x="36" y="156" width="270" height="16" fill="rgba(88,166,255,0.04)"/>
    <text x="48" y="167" class="muted" font-size="9" letter-spacing="0.8" font-weight="600">COMPLETED</text>
    <text x="122" y="167" class="muted" font-size="9">Today</text>
    <rect x="188" y="159" width="16" height="10" rx="5" fill="rgba(88,166,255,0.1)"/>
    <text x="196" y="167" class="accent" font-size="8" text-anchor="middle">1</text>

    <!-- Completed agent row -->
    <rect x="36" y="172" width="270" height="34" fill="transparent"/>
    <text x="52" y="186" fill="#3fb950" font-size="12">✓</text>
    <text x="66" y="186" class="bright" font-size="12">auth-refactor</text>
    <text x="146" y="186" class="muted" font-size="11"> · 12m</text>
    <rect x="188" y="177" width="48" height="13" rx="6" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="0.8"/>
    <text x="212" y="186" fill="#4ade80" font-size="9" text-anchor="middle">codex-5.4</text>
    <text x="52" y="199" class="muted" font-size="10">12 files · </text>
    <text x="91" y="199" fill="#3fb950" font-size="10" font-family="Cascadia Code, monospace">+340</text>
    <text x="113" y="199" class="muted" font-size="10">/</text>
    <text x="118" y="199" fill="#f85149" font-size="10" font-family="Cascadia Code, monospace">-87</text>

    <!-- ── FAILED section ── -->
    <rect x="36" y="206" width="270" height="16" fill="rgba(248,81,73,0.05)"/>
    <text x="48" y="217" fill="#f85149" font-size="9" letter-spacing="0.8" font-weight="600">FAILED</text>
    <rect x="78" y="209" width="16" height="10" rx="5" fill="rgba(248,81,73,0.15)"/>
    <text x="86" y="217" fill="#f85149" font-size="8" text-anchor="middle">1</text>

    <!-- Failed agent row -->
    <rect x="36" y="222" width="270" height="34" fill="rgba(248,81,73,0.03)"/>
    <text x="52" y="236" fill="#f85149" font-size="12">✗</text>
    <text x="66" y="236" class="bright" font-size="12">db-migration</text>
    <rect x="176" y="227" width="56" height="13" rx="6" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.25)" stroke-width="0.8"/>
    <text x="204" y="236" fill="#60a5fa" font-size="9" text-anchor="middle">gemini-pro</text>
    <text x="52" y="249" fill="#f85149" font-size="10">Error: connection timeout</text>
  </g>

  <!-- ═══ Dock bar (right side) ═══ -->
  <g filter="url(#shadow)">
    <rect x="332" y="80" width="210" height="210" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <!-- Titlebar -->
    <rect x="332" y="80" width="210" height="28" rx="14" fill="#21262d"/>
    <rect x="332" y="94" width="210" height="14" fill="#21262d"/>
    <circle cx="349" cy="94" r="4" fill="#f85149"/>
    <circle cx="363" cy="94" r="4" fill="#d29922"/>
    <circle cx="377" cy="94" r="4" fill="#3fb950"/>
    <text x="437" y="99" class="muted" font-size="11" text-anchor="middle">macOS Dock</text>

    <!-- Dock content area -->
    <rect x="332" y="108" width="210" height="182" fill="#1c2128"/>

    <!-- Dock label -->
    <text x="437" y="126" class="muted" font-size="10" text-anchor="middle" letter-spacing="0.8">PROJECT WINDOWS</text>

    <!-- Dock icons row -->
    <!-- MY-APP 🚀 (active) -->
    <rect x="350" y="134" width="48" height="48" rx="12" fill="rgba(88,166,255,0.15)" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow)"/>
    <text x="374" y="167" font-size="26" text-anchor="middle">🚀</text>
    <text x="374" y="195" class="accent" font-size="9" text-anchor="middle" font-weight="600">my-app</text>
    <!-- Active dot -->
    <circle cx="374" cy="202" r="2.5" fill="#58a6ff"/>

    <!-- API-SERVER ⚙️ -->
    <rect x="408" y="134" width="48" height="48" rx="12" fill="#21262d"/>
    <text x="432" y="167" font-size="26" text-anchor="middle">⚙️</text>
    <text x="432" y="195" class="muted" font-size="9" text-anchor="middle">api-server</text>
    <circle cx="432" cy="202" r="2.5" fill="#21262d"/>

    <!-- DATA 📊 -->
    <rect x="466" y="134" width="48" height="48" rx="12" fill="#21262d"/>
    <text x="490" y="167" font-size="26" text-anchor="middle">📊</text>
    <text x="490" y="195" class="muted" font-size="9" text-anchor="middle">data</text>

    <!-- Agent count badges on dock icons -->
    <rect x="386" y="130" width="16" height="14" rx="7" fill="#3fb950"/>
    <text x="394" y="140" fill="#000" font-size="8" text-anchor="middle" font-weight="700">3</text>

    <!-- Divider -->
    <line x1="352" y1="212" x2="522" y2="212" stroke="#30363d" stroke-width="1"/>

    <!-- Model key -->
    <text x="347" y="228" class="muted" font-size="9">Models active:</text>
    <rect x="346" y="234" width="36" height="12" rx="6" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="0.8"/>
    <text x="364" y="243" fill="#a78bfa" font-size="8" text-anchor="middle">opus</text>
    <rect x="388" y="234" width="44" height="12" rx="6" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="0.8"/>
    <text x="410" y="243" fill="#4ade80" font-size="8" text-anchor="middle">codex-5.4</text>
    <rect x="438" y="234" width="50" height="12" rx="6" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.25)" stroke-width="0.8"/>
    <text x="463" y="243" fill="#60a5fa" font-size="8" text-anchor="middle">gemini-pro</text>

    <!-- Click to focus hint -->
    <rect x="346" y="252" width="168" height="26" rx="8" fill="rgba(88,166,255,0.06)" stroke="rgba(88,166,255,0.15)" stroke-width="1"/>
    <text x="430" y="264" class="accent" font-size="10" text-anchor="middle">Click any agent → focus window</text>
    <text x="430" y="275" class="muted" font-size="9" text-anchor="middle">Ghostty · tmux · iTerm2 · Terminal</text>
  </g>

  <!-- Connection line between panels -->
  <path d="M306 185 C318 185 326 185 332 185" fill="none" stroke="url(#linkLine)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="306" cy="185" r="3" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="332" cy="185" r="3" fill="#58a6ff" filter="url(#glow)"/>

  <!-- Bottom caption -->
  <text x="280" y="318" class="bright" font-size="12" text-anchor="middle" font-weight="600">See · Click · Know</text>
  <text x="280" y="332" class="muted" font-size="10" text-anchor="middle">Claude · Codex · Gemini — all in one sidebar</text>
</svg>
