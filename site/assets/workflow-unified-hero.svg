<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" role="img" aria-labelledby="title desc">
  <title id="title">Command Central seamless workflow mockup</title>
  <desc id="desc">VS Code sidebar with auto-discovered agents, a linked project terminal, and Dock icons showing the same per-project identity.</desc>
  <defs>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2735"/>
      <stop offset="55%" stop-color="#121821"/>
      <stop offset="100%" stop-color="#0f141b"/>
    </linearGradient>
    <linearGradient id="panelShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d232c"/>
      <stop offset="100%" stop-color="#141a22"/>
    </linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#58a6ff" stop-opacity="0.65"/>
      <stop offset="80%" stop-color="#58a6ff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#58a6ff" flood-opacity="0.35"/>
    </filter>
    <style>
      .frame { fill: url(#panelShade); stroke: #30363d; stroke-width: 1; }
      .titlebar { fill: #21262d; }
      .activity { fill: #0f141b; }
      .sidebar { fill: #151b23; }
      .editor { fill: #10161f; }
      .terminal { fill: #0d131b; }
      .dock { fill: rgba(230, 237, 243, 0.1); stroke: rgba(230, 237, 243, 0.14); stroke-width: 1; }
      .muted { fill: #8b949e; font-family: "Inter", system-ui, sans-serif; }
      .label { fill: #c9d1d9; font-family: "Inter", system-ui, sans-serif; }
      .bright { fill: #e6edf3; font-family: "Space Grotesk", "Inter", system-ui, sans-serif; }
      .mono { fill: #c9d1d9; font-family: "SFMono-Regular", "Cascadia Code", Consolas, monospace; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
      .amber { fill: #d29922; }
      .red { fill: #f85149; }
      .chip { fill: rgba(88, 166, 255, 0.14); stroke: rgba(88, 166, 255, 0.28); stroke-width: 1; }
      .chip-soft { fill: rgba(63, 185, 80, 0.12); stroke: rgba(63, 185, 80, 0.28); stroke-width: 1; }
    </style>
  </defs>

  <rect width="560" height="340" rx="22" fill="#161b22"/>
  <circle cx="110" cy="28" r="90" fill="#58a6ff" opacity="0.08"/>
  <circle cx="446" cy="66" r="84" fill="#3fb950" opacity="0.06"/>
  <circle cx="462" cy="290" r="96" fill="#58a6ff" opacity="0.06"/>

  <g filter="url(#softShadow)">
    <rect x="18" y="24" width="304" height="224" rx="18" fill="url(#bgGlow)" stroke="#30363d"/>
    <rect x="18" y="24" width="304" height="34" rx="18" class="titlebar"/>
    <rect x="18" y="58" width="18" height="190" class="activity"/>
    <rect x="36" y="58" width="122" height="190" class="sidebar"/>
    <rect x="158" y="58" width="164" height="190" class="editor"/>

    <circle cx="36" cy="41" r="4" fill="#f85149"/>
    <circle cx="50" cy="41" r="4" fill="#d29922"/>
    <circle cx="64" cy="41" r="4" fill="#3fb950"/>
    <text x="176" y="45" class="muted" font-size="12">partner-web</text>

    <rect x="22" y="74" width="10" height="30" rx="4" fill="#58a6ff" opacity="0.2"/>
    <rect x="22" y="112" width="10" height="30" rx="4" fill="#21262d"/>
    <rect x="22" y="150" width="10" height="30" rx="4" fill="#21262d"/>

    <text x="48" y="79" class="muted" font-size="10" letter-spacing="1.4">COMMAND CENTRAL</text>

    <rect x="44" y="92" width="106" height="54" rx="12" fill="rgba(88, 166, 255, 0.12)" stroke="rgba(88, 166, 255, 0.26)"/>
    <text x="54" y="112" font-size="15">🚀</text>
    <text x="76" y="111" class="bright" font-size="13" font-weight="700">partner-web</text>
    <text x="76" y="127" class="muted" font-size="10">3 auto-discovered agents</text>
    <rect x="118" y="101" width="22" height="22" rx="7" fill="rgba(88, 166, 255, 0.16)"/>
    <text x="129" y="116" class="accent" font-size="12" text-anchor="middle">▶</text>

    <g transform="translate(52 150)">
      <circle cx="4" cy="5" r="4" class="green"/>
      <text x="16" y="9" class="label" font-size="11">codex refactor auth</text>
      <text x="97" y="9" class="muted" font-size="10">4m</text>
      <rect x="112" y="-3" width="16" height="16" rx="5" fill="#21262d"/>
      <text x="120" y="9" class="muted" font-size="9" text-anchor="middle">□</text>
      <rect x="132" y="-3" width="16" height="16" rx="5" fill="#21262d"/>
      <text x="140" y="9" class="muted" font-size="9" text-anchor="middle">↻</text>
      <rect x="152" y="-3" width="16" height="16" rx="5" fill="#21262d"/>
      <text x="160" y="9" class="muted" font-size="9" text-anchor="middle">≣</text>
    </g>
    <g transform="translate(52 172)">
      <circle cx="4" cy="5" r="4" class="green"/>
      <text x="16" y="9" class="label" font-size="11">claude add review notes</text>
      <text x="114" y="9" class="muted" font-size="10">2m</text>
    </g>
    <g transform="translate(52 194)">
      <circle cx="4" cy="5" r="4" class="amber"/>
      <text x="16" y="9" class="label" font-size="11">gemini triage flaky tests</text>
      <text x="118" y="9" class="muted" font-size="10">queued</text>
    </g>

    <rect x="170" y="74" width="140" height="22" rx="8" fill="#151b23" stroke="#2b313a"/>
    <rect x="176" y="80" width="32" height="10" rx="5" fill="#58a6ff" opacity="0.18"/>
    <rect x="214" y="80" width="38" height="10" rx="5" fill="#21262d"/>
    <rect x="258" y="80" width="24" height="10" rx="5" fill="#21262d"/>

    <rect x="170" y="104" width="68" height="18" rx="7" fill="rgba(88, 166, 255, 0.12)"/>
    <text x="180" y="117" class="accent" font-size="10">auth-flow.ts</text>
    <rect x="246" y="104" width="56" height="18" rx="7" fill="rgba(63, 185, 80, 0.12)"/>
    <text x="258" y="117" class="green" font-size="10">running</text>

    <text x="170" y="144" class="mono" font-size="11">export async function syncSession() {</text>
    <text x="182" y="161" class="mono" font-size="11"><tspan class="accent">const</tspan> agents = await discoverAgents()</text>
    <text x="182" y="178" class="mono" font-size="11"><tspan class="accent">return</tspan> groupByProject(agents)</text>
    <text x="170" y="195" class="mono" font-size="11">}</text>
    <rect x="170" y="210" width="132" height="18" rx="9" fill="rgba(110, 118, 129, 0.12)"/>
    <text x="180" y="223" class="muted" font-size="10">linked to partner-web terminal</text>

    <rect x="340" y="58" width="202" height="186" rx="18" class="frame"/>
    <rect x="340" y="58" width="202" height="34" rx="18" class="titlebar"/>
    <circle cx="358" cy="75" r="4" fill="#f85149"/>
    <circle cx="372" cy="75" r="4" fill="#d29922"/>
    <circle cx="386" cy="75" r="4" fill="#3fb950"/>
    <text x="400" y="79" class="bright" font-size="13" font-weight="700">🚀 partner-web</text>
    <rect x="470" y="67" width="60" height="16" rx="8" class="chip-soft"/>
    <text x="500" y="78" class="green" font-size="10" text-anchor="middle">ready</text>

    <text x="356" y="116" class="mono" font-size="12">$ codex --continue</text>
    <text x="356" y="136" class="mono" font-size="11">Working on auth sidebar + launch flow</text>
    <rect x="356" y="146" width="120" height="18" rx="9" class="chip"/>
    <text x="368" y="159" class="accent" font-size="10">same task: refactor auth</text>

    <text x="356" y="184" class="mono" font-size="11">• src/providers/agent-status.ts</text>
    <text x="356" y="202" class="mono" font-size="11">• site/assets/workflow-unified.svg</text>
    <text x="356" y="220" class="mono" font-size="11">• 5 files  +118 / -24</text>

    <path d="M150 124 C248 124 256 124 340 142" fill="none" stroke="url(#link)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="150" cy="124" r="4" class="accent" filter="url(#blueGlow)"/>
    <circle cx="340" cy="142" r="4" class="accent" filter="url(#blueGlow)"/>

    <rect x="226" y="18" width="108" height="28" rx="14" fill="rgba(22, 27, 34, 0.94)" stroke="rgba(88, 166, 255, 0.26)"/>
    <text x="280" y="36" class="bright" font-size="12" text-anchor="middle" font-weight="700">⌘ Tab</text>
    <text x="280" y="52" class="muted" font-size="10" text-anchor="middle">zero re-orientation</text>

    <rect x="132" y="266" width="296" height="46" rx="23" class="dock"/>
    <rect x="154" y="276" width="28" height="28" rx="8" fill="#007acc"/>
    <text x="168" y="294" fill="#fff" font-size="11" text-anchor="middle">&lt;/&gt;</text>
    <rect x="190" y="272" width="36" height="36" rx="11" fill="rgba(88, 166, 255, 0.2)" stroke="rgba(88, 166, 255, 0.4)" filter="url(#blueGlow)"/>
    <text x="208" y="295" font-size="18" text-anchor="middle">🚀</text>
    <rect x="236" y="276" width="28" height="28" rx="8" fill="#21262d"/>
    <text x="250" y="294" font-size="15" text-anchor="middle">⚡</text>
    <rect x="272" y="276" width="28" height="28" rx="8" fill="#21262d"/>
    <text x="286" y="294" font-size="15" text-anchor="middle">🧪</text>
    <rect x="308" y="276" width="28" height="28" rx="8" fill="#11161f"/>
    <text x="322" y="294" fill="#e6edf3" font-size="12" text-anchor="middle">&gt;_</text>
    <rect x="344" y="276" width="28" height="28" rx="8" fill="#21262d"/>
    <text x="358" y="294" fill="#8b949e" font-size="13" text-anchor="middle">◎</text>
    <text x="280" y="328" class="muted" font-size="11" text-anchor="middle">Dock icon = project anchor = terminal window = sidebar group</text>
  </g>
</svg>
