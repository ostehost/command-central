<svg width="380" height="180" viewBox="0 0 380 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="380" height="180" fill="#161b22"/>
  
  <!-- Main terminal window -->
  <rect x="50" y="20" width="280" height="100" rx="8" fill="#1c2128"/>
  
  <!-- Title bar -->
  <rect x="50" y="20" width="280" height="28" rx="8" fill="#21262d"/>
  <rect x="50" y="36" width="280" height="12" fill="#21262d"/>
  
  <!-- Title bar content -->
  <text x="66" y="39" font-family="system-ui" font-size="24" fill="#e6edf3">🚀</text>
  <text x="98" y="39" font-family="system-ui" font-size="16" font-weight="500" fill="#e6edf3">My App</text>
  
  <!-- Terminal content -->
  <text x="58" y="62" font-family="monospace" font-size="14" fill="#58a6ff">$ npm run dev</text>
  
  <!-- Preview windows below (40% scale) -->
  <!-- API window -->
  <rect x="50" y="135" width="112" height="40" rx="3" fill="#1c2128"/>
  <rect x="50" y="135" width="112" height="11" rx="3" fill="#21262d"/>
  <rect x="50" y="141" width="112" height="5" fill="#21262d"/>
  <text x="56" y="149" font-family="system-ui" font-size="10" fill="#e6edf3">⚡</text>
  <text x="69" y="149" font-family="system-ui" font-size="7" font-weight="500" fill="#e6edf3">API</text>
  
  <!-- Tools window -->
  <rect x="182" y="135" width="112" height="40" rx="3" fill="#1c2128"/>
  <rect x="182" y="135" width="112" height="11" rx="3" fill="#21262d"/>
  <rect x="182" y="141" width="112" height="5" fill="#21262d"/>
  <text x="188" y="149" font-family="system-ui" font-size="10" fill="#e6edf3">🔧</text>
  <text x="201" y="149" font-family="system-ui" font-size="7" font-weight="500" fill="#e6edf3">Tools</text>
  
  <!-- Shared window -->
  <rect x="314" y="135" width="112" height="40" rx="3" fill="#1c2128"/>
  <rect x="314" y="135" width="112" height="11" rx="3" fill="#21262d"/>
  <rect x="314" y="141" width="112" height="5" fill="#21262d"/>
  <text x="320" y="149" font-family="system-ui" font-size="10" fill="#e6edf3">📦</text>
  <text x="333" y="149" font-family="system-ui" font-size="7" font-weight="500" fill="#e6edf3">Shared</text>
</svg>