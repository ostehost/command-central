<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .workflow-bg { fill: #21262d; stroke: #8b949e; stroke-width: 1; }
      .workflow-icon { font-family: system-ui, -apple-system, sans-serif; font-size: 24px; text-anchor: middle; }
      .workflow-title { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 600; fill: #e6edf3; text-anchor: middle; }
      .workflow-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #8b949e; text-anchor: middle; }
      .arrow { stroke: #58a6ff; stroke-width: 2; fill: none; }
      .arrow-head { fill: #58a6ff; }
      .loop-arrow { stroke: #3fb950; stroke-width: 2; fill: none; stroke-dasharray: 3,3; }
      .loop-text { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #3fb950; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="480" height="180" fill="#161b22"/>
  
  <!-- Step 1: Launch -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="70" height="80" rx="12" class="workflow-bg"/>
    <text x="35" y="30" class="workflow-icon">🚀</text>
    <text x="35" y="50" class="workflow-title">Launch</text>
    <text x="35" y="62" class="workflow-desc">Spawn agents in</text>
    <text x="35" y="72" class="workflow-desc">project terminals</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M125,90 L150,90" class="arrow"/>
  <polygon points="150,87 157,90 150,93" class="arrow-head"/>
  
  <!-- Step 2: Agents Work -->
  <g transform="translate(170, 50)">
    <rect x="0" y="0" width="70" height="80" rx="12" class="workflow-bg"/>
    <text x="35" y="30" class="workflow-icon">⚙️</text>
    <text x="35" y="50" class="workflow-title">Agents Work</text>
    <text x="35" y="62" class="workflow-desc">Code, test, and</text>
    <text x="35" y="72" class="workflow-desc">deliver features</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M255,90 L280,90" class="arrow"/>
  <polygon points="280,87 287,90 280,93" class="arrow-head"/>
  
  <!-- Step 3: Notifications -->
  <g transform="translate(300, 50)">
    <rect x="0" y="0" width="70" height="80" rx="12" class="workflow-bg"/>
    <text x="35" y="30" class="workflow-icon">🔔</text>
    <text x="35" y="50" class="workflow-title">Notify</text>
    <text x="35" y="62" class="workflow-desc">macOS alerts</text>
    <text x="35" y="72" class="workflow-desc">when complete</text>
  </g>
  
  <!-- Arrow 3 (down) -->
  <path d="M335,130 L335,150" class="arrow"/>
  <polygon points="332,150 335,157 338,150" class="arrow-head"/>
  
  <!-- Step 4: Review in CC -->
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="70" height="30" rx="6" class="workflow-bg"/>
    <text x="10" y="18" class="workflow-title" style="text-anchor: start; font-size: 10px;">📊 Review in CC</text>
  </g>
  
  <!-- Loop back arrow -->
  <path d="M300,165 Q240,170 180,165 Q120,160 75,140 Q75,120 75,100" class="loop-arrow"/>
  <polygon points="72,100 75,93 78,100" fill="#3fb950"/>
  
  <!-- Loop text -->
  <text x="190" y="175" class="loop-text">← Repeat workflow</text>
  
  <!-- Title -->
  <text x="240" y="25" text-anchor="middle" class="workflow-title" style="font-size: 14px;">Command Central Workflow</text>
</svg>