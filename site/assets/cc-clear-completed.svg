<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" role="img" aria-labelledby="cctitle ccdesc">
  <title id="cctitle">Command Central Clear Completed feature</title>
  <desc id="ccdesc">Before and after comparison: left panel shows a cluttered sidebar with 47 old completed entries, right panel shows a clean sidebar after clicking Clear Completed with only active work visible.</desc>
  <defs>
    <style>
      .bg { fill: #161b22; }
      .section-bg { fill: #1c2128; }
      .bright { fill: #e6edf3; font-family: "Space Grotesk", system-ui, sans-serif; }
      .muted { fill: #8b949e; font-family: "Space Grotesk", system-ui, sans-serif; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
      .mono { font-family: "Cascadia Code", Consolas, monospace; }
    </style>
  </defs>

  <!-- Overall background -->
  <rect width="480" height="160" rx="12" fill="#0d1117"/>

  <!-- ═══ LEFT PANEL: Before ═══ -->
  <rect x="8" y="8" width="200" height="120" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- titlebar -->
  <rect x="8" y="8" width="200" height="22" rx="10" fill="#21262d"/>
  <rect x="8" y="19" width="200" height="11" fill="#21262d"/>
  <circle cx="20" cy="19" r="3" fill="#f85149"/>
  <circle cx="30" cy="19" r="3" fill="#d29922"/>
  <circle cx="40" cy="19" r="3" fill="#3fb950"/>
  <text x="108" y="23" class="muted" font-size="9" text-anchor="middle">AGENT STATUS</text>

  <!-- Before: cluttered entries -->
  <rect x="8" y="30" width="200" height="14" class="section-bg"/>
  <text x="16" y="40" class="muted" font-size="8" font-weight="600">COMPLETED · Today (12)</text>

  <!-- Stacked completed rows (blurred/dense) -->
  <g opacity="0.7">
    <rect x="8" y="44" width="200" height="10" fill="rgba(255,255,255,0.02)"/>
    <text x="20" y="52" fill="#3fb950" font-size="7">✓</text>
    <text x="30" y="52" class="muted" font-size="8">auth-refactor</text>
    <rect x="8" y="54" width="200" height="10" fill="rgba(255,255,255,0.03)"/>
    <text x="20" y="62" fill="#3fb950" font-size="7">✓</text>
    <text x="30" y="62" class="muted" font-size="8">test-coverage</text>
    <rect x="8" y="64" width="200" height="10" fill="rgba(255,255,255,0.02)"/>
    <text x="20" y="72" fill="#3fb950" font-size="7">✓</text>
    <text x="30" y="72" class="muted" font-size="8">lint-fix</text>
    <rect x="8" y="74" width="200" height="10" fill="rgba(255,255,255,0.03)"/>
    <text x="20" y="82" fill="#3fb950" font-size="7">✓</text>
    <text x="30" y="82" class="muted" font-size="8">type-check</text>
  </g>
  <g opacity="0.45">
    <rect x="8" y="84" width="200" height="10" fill="rgba(255,255,255,0.02)"/>
    <text x="20" y="92" fill="#3fb950" font-size="7">✓</text>
    <text x="30" y="92" class="muted" font-size="8">api-routes</text>
    <rect x="8" y="94" width="200" height="10" fill="rgba(255,255,255,0.03)"/>
    <text x="20" y="102" fill="#3fb950" font-size="7">✓</text>
    <text x="30" y="102" class="muted" font-size="8">schema-update</text>
  </g>
  <!-- Older section indicator -->
  <rect x="8" y="104" width="200" height="14" fill="rgba(30,30,30,0.5)"/>
  <text x="16" y="114" class="muted" font-size="8">▶  Older (35)</text>
  <text x="100" y="114" fill="#d29922" font-size="7" text-anchor="middle">⚠ hard to find active</text>

  <!-- BEFORE label -->
  <text x="108" y="138" class="muted" font-size="10" text-anchor="middle">47 completed entries</text>

  <!-- ═══ ARROW ═══ -->
  <g>
    <path d="M214 68 C230 68 238 68 256 68" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
    <polygon points="256,63 266,68 256,73" fill="#58a6ff"/>
    <!-- Button label above arrow -->
    <rect x="214" y="46" width="48" height="16" rx="8" fill="rgba(88,166,255,0.12)" stroke="rgba(88,166,255,0.3)" stroke-width="0.8"/>
    <text x="238" y="57" class="accent" font-size="8" text-anchor="middle">Clear ✓</text>
  </g>

  <!-- ═══ RIGHT PANEL: After ═══ -->
  <rect x="272" y="8" width="200" height="120" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <!-- titlebar -->
  <rect x="272" y="8" width="200" height="22" rx="10" fill="#21262d"/>
  <rect x="272" y="19" width="200" height="11" fill="#21262d"/>
  <circle cx="284" cy="19" r="3" fill="#f85149"/>
  <circle cx="294" cy="19" r="3" fill="#d29922"/>
  <circle cx="304" cy="19" r="3" fill="#3fb950"/>
  <text x="372" y="23" class="muted" font-size="9" text-anchor="middle">AGENT STATUS</text>
  <!-- Clear Completed button in toolbar (highlighted as if just clicked) -->
  <rect x="420" y="11" width="48" height="12" rx="6" fill="rgba(63,185,80,0.15)" stroke="rgba(63,185,80,0.4)" stroke-width="0.8"/>
  <text x="444" y="19.5" fill="#3fb950" font-size="7" text-anchor="middle">Cleared ✓</text>

  <!-- After: clean sidebar -->
  <rect x="272" y="30" width="200" height="14" class="section-bg"/>
  <text x="280" y="40" fill="#3fb950" font-size="8" font-weight="600">RUNNING  ·  1 active</text>

  <!-- Only active work -->
  <rect x="272" y="44" width="200" height="36" fill="rgba(63,185,80,0.04)" stroke="rgba(63,185,80,0.15)" stroke-width="1"/>
  <circle cx="286" cy="55" r="3.5" fill="#3fb950"/>
  <text x="296" y="59" class="bright" font-size="10" font-weight="600">code-review</text>
  <rect x="362" y="49" width="28" height="12" rx="6" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="0.8"/>
  <text x="376" y="58" fill="#a78bfa" font-size="8" text-anchor="middle">opus</text>
  <text x="296" y="72" class="muted" font-size="9">3m 42s · 6 files · +81/-15</text>

  <!-- Empty completed section -->
  <rect x="272" y="80" width="200" height="48" fill="rgba(255,255,255,0.01)"/>
  <text x="372" y="100" class="muted" font-size="10" text-anchor="middle" opacity="0.6">No completed entries</text>
  <text x="372" y="116" class="muted" font-size="9" text-anchor="middle" opacity="0.5">Sidebar clear and focused</text>

  <!-- AFTER label -->
  <text x="372" y="138" class="bright" font-size="10" text-anchor="middle" font-weight="600">Only active work visible</text>

  <!-- Bottom caption -->
  <text x="240" y="152" class="muted" font-size="11" text-anchor="middle">One click to clear the noise. The active agent stays put.</text>
</svg>
