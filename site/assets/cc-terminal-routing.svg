<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-labelledby="trtitle trdesc">
  <title id="trtitle">Click any agent, land in the right terminal</title>
  <desc id="trdesc">Left panel shows the Agent Status sidebar with a cursor clicking on a task. An arrow flows to the right showing the Ghostty terminal focused on the correct tmux session with the matching project emoji.</desc>
  <defs>
    <linearGradient id="flowArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#58a6ff" flood-opacity="0.5"/>
    </filter>
    <style>
      .bg { fill: #161b22; }
      .section-bg { fill: #1c2128; }
      .bright { fill: #e6edf3; font-family: "Space Grotesk", system-ui, sans-serif; }
      .muted { fill: #8b949e; font-family: "Space Grotesk", system-ui, sans-serif; }
      .accent { fill: #58a6ff; }
      .green { fill: #3fb950; }
      .mono { font-family: "Cascadia Code", Consolas, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="200" rx="12" class="bg"/>

  <!-- ═══ LEFT: VS Code sidebar panel ═══ -->
  <rect x="8" y="8" width="192" height="148" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- titlebar -->
  <rect x="8" y="8" width="192" height="22" rx="10" fill="#21262d"/>
  <rect x="8" y="19" width="192" height="11" fill="#21262d"/>
  <circle cx="22" cy="19" r="3" fill="#f85149"/>
  <circle cx="33" cy="19" r="3" fill="#d29922"/>
  <circle cx="44" cy="19" r="3" fill="#3fb950"/>
  <text x="104" y="23" class="muted" font-size="9" text-anchor="middle">AGENT STATUS</text>

  <!-- Project header -->
  <rect x="8" y="30" width="192" height="20" class="section-bg"/>
  <text x="18" y="44" font-size="12">🚀</text>
  <text x="36" y="45" class="bright" font-size="11" font-weight="700">MY-APP</text>

  <!-- Running agent row - HIGHLIGHTED (being clicked) -->
  <rect x="8" y="50" width="192" height="36" fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <circle cx="22" cy="61" r="3.5" fill="#3fb950"/>
  <text x="31" y="65" class="bright" font-size="10" font-weight="600">code-review</text>
  <rect x="96" y="55" width="28" height="12" rx="6" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="0.8"/>
  <text x="110" y="64" fill="#a78bfa" font-size="8" text-anchor="middle">opus</text>
  <text x="31" y="78" class="muted" font-size="9">🚀 my-app  ·  3m 42s</text>
  <!-- Click highlight ring -->
  <rect x="8" y="50" width="192" height="36" rx="2" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- Second agent (dimmed) -->
  <rect x="8" y="86" width="192" height="26" fill="transparent"/>
  <text x="22" y="102" fill="#3fb950" font-size="9">✓</text>
  <text x="32" y="102" class="muted" font-size="10">auth-refactor · codex-5.4</text>

  <!-- Third agent (dimmed) -->
  <text x="22" y="122" fill="#3fb950" font-size="9">✓</text>
  <text x="32" y="122" class="muted" font-size="10">test-suite · opus</text>

  <!-- Mouse cursor on the highlighted row -->
  <g transform="translate(155 55)">
    <polygon points="0,0 0,14 4,10 7,16 9,15 6,9 10,9" fill="#e6edf3" stroke="#161b22" stroke-width="0.5"/>
  </g>

  <!-- ═══ ARROW in middle ═══ -->
  <g filter="url(#glow)">
    <path d="M205 84 L268 84" fill="none" stroke="url(#flowArrow)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="268,79 278,84 268,89" fill="#58a6ff"/>
  </g>
  <text x="241" y="100" class="accent" font-size="9" text-anchor="middle">click</text>
  <text x="241" y="112" class="accent" font-size="9" text-anchor="middle">→ focus</text>

  <!-- ═══ RIGHT: Ghostty terminal focused ═══ -->
  <rect x="280" y="8" width="192" height="148" rx="10" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <!-- titlebar -->
  <rect x="280" y="8" width="192" height="22" rx="10" fill="#21262d"/>
  <rect x="280" y="19" width="192" height="11" fill="#21262d"/>
  <circle cx="294" cy="19" r="3" fill="#f85149"/>
  <circle cx="305" cy="19" r="3" fill="#d29922"/>
  <circle cx="316" cy="19" r="3" fill="#3fb950"/>
  <text x="376" y="23" fill="#e6edf3" font-size="9" text-anchor="middle" font-weight="600">🚀 my-app — Ghostty</text>
  <!-- Active indicator -->
  <rect x="456" y="11" width="8" height="8" rx="4" fill="#3fb950"/>

  <!-- Terminal content -->
  <text x="292" y="44" fill="#3fb950" font-size="10" font-family="Cascadia Code, monospace">$ tmux attach -t my-app</text>
  <text x="292" y="58" fill="#8b949e" font-size="9" font-family="Cascadia Code, monospace">[my-app] 0:claude-code* 1:codex</text>

  <!-- Active pane highlight -->
  <rect x="288" y="64" width="176" height="54" rx="4" fill="rgba(88,166,255,0.04)" stroke="rgba(88,166,255,0.2)" stroke-width="1"/>
  <text x="292" y="78" fill="#58a6ff" font-size="9" font-family="Cascadia Code, monospace">claude --continue</text>
  <text x="292" y="91" fill="#8b949e" font-size="9" font-family="Cascadia Code, monospace">Reviewing auth module...</text>
  <text x="292" y="104" fill="#8b949e" font-size="9" font-family="Cascadia Code, monospace">3 files changed, +48/-12</text>
  <!-- Blinking cursor -->
  <rect x="292" y="110" width="6" height="10" rx="1" fill="#58a6ff" opacity="0.9"/>

  <!-- tmux tab bar -->
  <rect x="280" y="118" width="192" height="16" fill="#1c2128"/>
  <rect x="282" y="120" width="60" height="12" rx="4" fill="#21262d" stroke="#58a6ff" stroke-width="1"/>
  <text x="312" y="129" fill="#58a6ff" font-size="8" text-anchor="middle">claude-code</text>
  <rect x="346" y="120" width="40" height="12" rx="4" fill="transparent"/>
  <text x="366" y="129" class="muted" font-size="8" text-anchor="middle">codex</text>

  <!-- Project emoji matches -->
  <text x="288" y="148" font-size="11">🚀</text>
  <text x="304" y="148" class="accent" font-size="9">same project, same window</text>

  <!-- Bottom caption -->
  <text x="240" y="172" class="bright" font-size="13" text-anchor="middle" font-weight="600">Click any agent. Land in the right terminal.</text>
  <text x="240" y="188" class="muted" font-size="11" text-anchor="middle">No searching. No guessing. The right session, instantly.</text>
</svg>
